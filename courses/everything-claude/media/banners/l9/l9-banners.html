<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>L9 Section Banners — Everything Claude</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    body { background: #f5f5f5; padding: 40px; font-family: sans-serif; }
    .banner-block { margin-bottom: 60px; }
    .banner-label { font-size: 12px; color: #888; margin-bottom: 8px; font-family: monospace; }
  </style>
</head>
<body>

<!-- ============================================================ -->
<!-- BANNER 1: S1 — Your Complete Morning Briefing                -->
<!-- ============================================================ -->

<div class="banner-label">s1-your-complete-morning-briefing.png</div>
<div class="banner-block">

  <!-- S1 HTML BLOCK — PASTE INTO LESSON -->
  <div style="position: relative; width: 100%; max-width: 1200px; display: block;">
    <img src="s1-your-complete-morning-briefing.png" style="width: 100%; display: block;" alt="">

    <!-- Corner fades — standard defensive blending -->
    <!-- Top-left corner: safe, no illustration content -->
    <div style="position: absolute; top: 0; left: 0; width: 120px; height: 80px; background: radial-gradient(ellipse at top left, #ffffff 0%, transparent 70%); pointer-events: none;"></div>
    <!-- Top-right corner: safe, no illustration content -->
    <div style="position: absolute; top: 0; right: 0; width: 120px; height: 80px; background: radial-gradient(ellipse at top right, #ffffff 0%, transparent 70%); pointer-events: none;"></div>
    <!-- Bottom-left corner: illustration content at bottom — skip -->
    <!-- Bottom-right corner: illustration content at bottom — skip -->

    <!-- Oswald heading overlay — top centre, between light clusters (approx 25-65% horizontal clear zone) -->
    <div style="position: absolute; top: 4%; left: 0; right: 0; text-align: center;">
      <h2 style="font-family: Oswald, sans-serif; font-size: 36px; font-weight: 700; color: #222; text-transform: uppercase; letter-spacing: 0.04em; margin: 0; white-space: nowrap;">Your Complete Morning Briefing</h2>
    </div>

  </div>
  <!-- END S1 HTML BLOCK -->

</div>


<!-- ============================================================ -->
<!-- BANNER 2: S2 — Continuing to Refine                          -->
<!-- ============================================================ -->

<div class="banner-label">s2-continuing-to-refine.png</div>
<div class="banner-block">

  <!-- S2 HTML BLOCK — PASTE INTO LESSON -->
  <div style="position: relative; width: 100%; max-width: 1200px; display: block;">
    <img src="s2-continuing-to-refine.png" style="width: 100%; display: block;" alt="">

    <!-- Corner fades — top-left and top-right safe (white space confirmed) -->
    <div style="position: absolute; top: 0; left: 0; width: 120px; height: 80px; background: radial-gradient(ellipse at top left, #ffffff 0%, transparent 70%); pointer-events: none;"></div>
    <div style="position: absolute; top: 0; right: 0; width: 120px; height: 80px; background: radial-gradient(ellipse at top right, #ffffff 0%, transparent 70%); pointer-events: none;"></div>
    <!-- Bottom corners: illustration content — skip -->

    <!-- Right edge top fade — white 0-43% of right edge (10% buffer from 53% illustration boundary = 43% safe zone) -->
    <!-- 43% of image height is sufficient for a fade strip -->
    <div style="position: absolute; top: 0; right: 0; width: 50px; height: 43%; background: linear-gradient(to left, #ffffff, transparent); pointer-events: none;"></div>

    <!-- Oswald heading overlay — top right quadrant (50-100% horizontal, top 18% vertical) -->
    <div style="position: absolute; top: 5%; right: 5%; text-align: right;">
      <h2 style="font-family: Oswald, sans-serif; font-size: 36px; font-weight: 700; color: #222; text-transform: uppercase; letter-spacing: 0.04em; margin: 0; white-space: nowrap;">Continuing to Refine</h2>
    </div>

  </div>
  <!-- END S2 HTML BLOCK -->

</div>


<!-- ============================================================ -->
<!-- BANNER 3: S3 — Best-Practice Project                         -->
<!-- ============================================================ -->

<div class="banner-label">s3-best-practice-project.png</div>
<div class="banner-block">

  <!-- S3 HTML BLOCK — PASTE INTO LESSON -->
  <div style="position: relative; width: 100%; max-width: 1200px; display: block;">
    <img src="s3-best-practice-project.png" style="width: 100%; display: block;" alt="">

    <!-- Corner fades:
         Top-left: pipe illustration starts at 0% — skip top-left
         Top-right: white 0-20% — safe to apply
         Bottom corners: illustration content — skip
    -->
    <div style="position: absolute; top: 0; right: 0; width: 120px; height: 80px; background: radial-gradient(ellipse at top right, #ffffff 0%, transparent 70%); pointer-events: none;"></div>

    <!-- Top edge: white zone is 15-43% and 45-72% and 74-100% (horizontal).
         Left zone (0-15%) has pipe content — no left top fade.
         Right zone (74-100%) is pure white — right top corner fade already applied above.
    -->

    <!-- Oswald heading overlay — upper centre-right clear zone (approx 30-60% horizontal).
         Positioning: text-align centre, shifted slightly right to land in the identified white space between pipe end and woman's head.
    -->
    <div style="position: absolute; top: 4%; left: 25%; right: 5%; text-align: center;">
      <h2 style="font-family: Oswald, sans-serif; font-size: 36px; font-weight: 700; color: #222; text-transform: uppercase; letter-spacing: 0.04em; margin: 0; white-space: nowrap;">You've Built a Best-Practice Project</h2>
    </div>

  </div>
  <!-- END S3 HTML BLOCK -->

</div>

</body>
</html>
